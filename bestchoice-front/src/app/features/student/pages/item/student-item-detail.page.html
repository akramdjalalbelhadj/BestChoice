<div class="app-layout">
  <aside class="sidebar">...</aside>

  <main class="main-content">
    @if (isLoading()) {
      <div class="loading-state">Récupération des opportunités en cours...</div>
    } @else if (campaign()) {
      <header class="detail-header">
        <a routerLink="/app/student/campaigns" class="back-link">← Retour</a>
        <div class="header-main">
          <h1>{{ campaign()?.name }}</h1>
          <p class="subtitle">
            {{ items().length }} {{ isProjectCampaign() ? 'projets' : 'matières' }} disponibles
          </p>
        </div>
      </header>

      <div class="items-grid">
        @for (it of (items() || []); track it.id) {
          <div class="item-card">
          </div>
        } @empty {
          <div class="empty-state">Aucun contenu trouvé.</div>
        }
      </div>
    }
  </main>
</div>
